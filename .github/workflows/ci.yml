name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build runs in topological order, so packages/* are built before consumer
      # services/apps. Required so that downstream `tsc --noEmit` can resolve
      # workspace package types from each package's emitted `dist/`.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      # TODO(ME-6): wire `pnpm lint` once @secureloop/eslint-config exists.
      # TODO: wire `pnpm test` once first service has Vitest configured.
